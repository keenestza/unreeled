<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08090c;--card:#0f1014;--el:#16171d;--hov:#1c1d25;--accent:#ff6b35;--agl:rgba(255,107,53,0.12);--text:#e8e8ec;--ts:#a0a0ae;--td:#8888a0;--brd:#1e1f28;--bl:#282935;--sl:#3ec98c;--slb:rgba(62,201,140,0.08);--slr:rgba(62,201,140,0.25);--sm:#f0c038;--smb:rgba(240,192,56,0.08);--smr:rgba(240,192,56,0.25);--sh:#ef4444;--shb:rgba(239,68,68,0.08);--shr:rgba(239,68,68,0.25)}
/* LIGHT MODE */
[data-theme="light"]{--bg:#f5f5f7;--card:#ffffff;--el:#f0f0f3;--hov:#e8e8ec;--accent:#e85d2a;--agl:rgba(232,93,42,0.1);--text:#1a1a2e;--ts:#4a4a5e;--td:#8a8a9e;--brd:#dddde5;--bl:#c8c8d4;--sl:#2aa66e;--slb:rgba(42,166,110,0.08);--slr:rgba(42,166,110,0.2);--sm:#c8960a;--smb:rgba(200,150,10,0.08);--smr:rgba(200,150,10,0.2);--sh:#dc2626;--shb:rgba(220,38,38,0.06);--shr:rgba(220,38,38,0.2)}
[data-theme="light"] .nav{background:rgba(245,245,247,0.92)}
[data-theme="light"] .bnav{background:rgba(245,245,247,0.96)}
[data-theme="light"] .mobile-search{background:rgba(245,245,247,0.92)}
[data-theme="light"] .modal-bg{background:rgba(0,0,0,0.3)}
[data-theme="light"] .pb img{box-shadow:0 2px 8px rgba(0,0,0,0.1)}
/* THEME TOGGLE */
.theme-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--el);border:1px solid var(--brd);transition:all .15s;cursor:pointer}
.theme-btn:hover{background:var(--hov);border-color:var(--bl)}
/* SKELETON LOADING */
.skel{background:linear-gradient(90deg,var(--el) 25%,var(--hov) 50%,var(--el) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:90px;margin-bottom:8px;border-radius:12px}
.skel-line{height:14px;margin-bottom:8px;border-radius:4px}
.skel-line.w60{width:60%}.skel-line.w40{width:40%}.skel-line.w80{width:80%}
/* NEW TODAY BADGE */
.new-badge{display:inline-block;padding:2px 6px;background:var(--accent);color:#fff;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:6px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* EMPTY STATES */
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:48px;margin-bottom:12px;display:block}
.empty h2{font-family:'Fraunces',serif;font-size:20px;margin-bottom:6px}
.empty p{color:var(--ts);font-size:14px;max-width:320px;margin:0 auto}
.empty a{color:var(--accent);cursor:pointer}
/* STAR RATING */
.stars{display:inline-flex;gap:2px}.stars span{cursor:pointer;font-size:18px;color:var(--brd);transition:all .12s}.stars span:hover,.stars span.on{color:#f0c038}
.avg-rating{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--td)}.avg-rating em{font-style:normal;font-weight:700;color:var(--sm)}
/* PWA INSTALL BANNER */
.pwa-banner{position:fixed;bottom:68px;left:12px;right:12px;z-index:2500;background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;display:none;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:slideUp .3s ease}
.pwa-banner.show{display:flex}
.pwa-banner .pwa-icon{width:42px;height:42px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.pwa-banner .pwa-text{flex:1}
.pwa-banner .pwa-text h4{font-size:13px;font-weight:700;margin-bottom:2px}
.pwa-banner .pwa-text p{font-size:11px;color:var(--td)}
.pwa-banner .pwa-btns{display:flex;gap:6px;flex-shrink:0}
.pwa-banner .pwa-btns button{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600}
.pwa-banner .pwa-install{background:var(--accent);color:#fff}
.pwa-banner .pwa-dismiss{background:var(--el);color:var(--td);border:1px solid var(--brd)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input{font-family:inherit}
.nav{position:sticky;top:0;z-index:1000;height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,9,12,0.88);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--brd)}
.nav-l{display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo i{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;font-style:normal}
.logo span{font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-0.5px}
.tabs{display:flex;gap:2px}
.tab{padding:5px 11px;font-size:12.5px;font-weight:500;color:var(--ts);border-radius:6px;transition:all .15s}
.tab:hover{color:var(--text);background:var(--el)}
.tab.on{color:var(--text);background:var(--el)}
.nav-r{display:flex;align-items:center;gap:8px}
.btn-a{padding:6px 15px;background:var(--accent);border-radius:6px;color:#fff;font-size:12.5px;font-weight:600;transition:all .15s}
.btn-a:hover{filter:brightness(1.1)}
.user-pill{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;background:var(--el);border:1px solid var(--brd);border-radius:100px;font-size:12px;color:var(--ts);cursor:pointer;transition:all .15s}
.user-pill:hover{border-color:var(--bl);color:var(--text)}
.user-pill .uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.umenu{position:fixed;top:52px;right:20px;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:6px;min-width:180px;display:none;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.umenu.show{display:block}
.umenu button{display:block;width:100%;text-align:left;padding:8px 12px;font-size:12.5px;color:var(--text);border-radius:6px;transition:all .12s}
.umenu button:hover{background:var(--el);color:var(--text)}
.umenu hr{border:none;border-top:1px solid var(--brd);margin:4px 0}
.page{display:none;max-width:920px;margin:0 auto;padding:28px 20px 60px;animation:pageIn .25s ease}.page.on{display:block}
@keyframes pageIn{from{opacity:0}to{opacity:1}}
h1.hero{font-family:'Fraunces',serif;font-size:32px;font-weight:700;letter-spacing:-1.5px;margin-bottom:6px;line-height:1.1}
.sub{color:var(--ts);font-size:14px;margin-bottom:22px;line-height:1.5}.sub b{color:var(--accent);font-weight:600}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:32px;width:100%;max-width:400px;position:relative;animation:modalIn .2s ease;box-shadow:0 16px 48px rgba(0,0,0,0.3)}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal h2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:4px}
.modal p.ms{font-size:13px;color:var(--td);margin-bottom:20px}
.modal .close{position:absolute;top:12px;right:16px;font-size:20px;color:var(--td);background:none;border:none;cursor:pointer}
.modal .close:hover{color:var(--text)}
.finput{width:100%;padding:10px 12px;background:var(--el);border:1px solid var(--brd);border-radius:7px;color:var(--text);font-size:13.5px;outline:none;margin-bottom:10px;transition:border-color .15s}
.finput:focus{border-color:var(--accent)}
.finput::placeholder{color:var(--ts)}
.fbtn{width:100%;padding:10px;background:var(--accent);border-radius:7px;color:#fff;font-size:13.5px;font-weight:600;border:none;cursor:pointer;margin-top:4px;transition:all .15s}
.fbtn:hover{filter:brightness(1.1)}
.fbtn:disabled{opacity:0.5;cursor:not-allowed}
.flink{font-size:12px;color:var(--td);margin-top:12px;text-align:center}
.flink a{color:var(--accent);cursor:pointer;text-decoration:none}
.flink a:hover{text-decoration:underline}
.ferr{font-size:12px;color:var(--sh);margin-bottom:8px;display:none}
.ferr.show{display:block}
.fok{font-size:12px;color:var(--sl);margin-bottom:8px;display:none}
.fok.show{display:block}
/* DATE PICKER */
.dp{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dp-btn{padding:6px 11px;background:var(--card);border:1px solid var(--brd);border-radius:7px;color:var(--ts);font-size:13px;font-weight:500;transition:all .15s}
.dp-btn:hover{border-color:var(--bl);color:var(--text)}
.dp select{background:var(--card);border:1px solid var(--brd);border-radius:7px;color:var(--text);padding:6px 10px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;max-width:220px}
.dp-single{font-size:13px;color:var(--ts)}
/* FILTERS */
.fbar{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.fc{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500;background:var(--card);border:1px solid var(--brd);color:var(--ts);transition:all .15s;display:flex;align-items:center;gap:6px}
.fc:hover{border-color:var(--bl);color:var(--text);background:var(--el)}
.fc.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fc .dot{width:7px;height:7px;border-radius:50%}
/* CARDS */
.rc{display:flex;gap:14px;padding:14px;background:var(--card);border:1px solid var(--brd);border-left:3px solid var(--brd);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:all .2s;animation:fi .3s ease both}
.rc:hover{border-color:var(--bl);background:var(--el);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.rc.t-movie{border-left-color:#6366f1}.rc.t-tv{border-left-color:#a855f7}.rc.t-book{border-left-color:#14b8a6}.rc.t-game{border-left-color:#f43f5e}.rc.t-anime{border-left-color:#ec4899}.rc.t-music{border-left-color:#eab308}.rc.t-podcast{border-left-color:#8b5cf6}.rc.t-news{border-left-color:#94a3b8}.rc.t-disc{border-left-color:#0ea5e9}.rc.t-boardgame{border-left-color:#06b6d4}.rc.t-comic{border-left-color:#f97316}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pb{flex-shrink:0;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pb::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,0.08);border-radius:inherit}.pb{box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.pb.movie{background:linear-gradient(145deg,#312e81,#4338ca)}.pb.tv{background:linear-gradient(145deg,#581c87,#7e22ce)}.pb.book{background:linear-gradient(145deg,#134e4a,#0f766e)}.pb.game{background:linear-gradient(145deg,#881337,#be123c)}.pb.anime{background:linear-gradient(145deg,#831843,#be185d)}.pb.music{background:linear-gradient(145deg,#713f12,#a16207)}.pb.podcast{background:linear-gradient(145deg,#4c1d95,#6d28d9)}.pb.boardgame{background:linear-gradient(145deg,#164e63,#0891b2)}.pb.comic{background:linear-gradient(145deg,#7c2d12,#c2410c)}.pb.news{background:linear-gradient(145deg,#1e293b,#475569)}.pb.disc{background:linear-gradient(145deg,#0c4a6e,#0284c7)}
.pb img{width:100%;height:100%;object-fit:cover;border-radius:inherit;transition:transform .3s ease}.rc:hover .pb img{transform:scale(1.05)}
.ri{flex:1;min-width:0}
.rt{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px}
.rn{font-family:'Fraunces',serif;font-size:16px;font-weight:600;letter-spacing:-0.3px;line-height:1.25;color:var(--text)}
.mb{padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;flex-shrink:0;white-space:nowrap;transition:all .15s}
.mb.movie{background:rgba(99,102,241,0.15);color:#6366f1}.mb.tv{background:rgba(168,85,247,0.15);color:#a855f7}.mb.book{background:rgba(20,184,166,0.15);color:#14b8a6}.mb.game{background:rgba(244,63,94,0.15);color:#f43f5e}.mb.anime{background:rgba(236,72,153,0.15);color:#ec4899}.mb.music{background:rgba(234,179,8,0.15);color:#eab308}.mb.podcast{background:rgba(139,92,246,0.15);color:#8b5cf6}.mb.boardgame{background:rgba(6,182,212,0.15);color:#06b6d4}.mb.comic{background:rgba(249,115,22,0.15);color:#f97316}.mb.news{background:rgba(100,116,139,0.15);color:#94a3b8}.mb.disc{background:rgba(14,165,233,0.15);color:#0ea5e9}
.rm{font-size:11.5px;color:var(--ts);margin-bottom:6px}.rm .s{color:var(--bl);margin:0 4px}
.rs{font-size:12.5px;color:var(--ts);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.rf{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.gt{display:flex;gap:4px;flex-wrap:wrap}.gt span{padding:2px 7px;background:var(--el);border:1px solid var(--brd);border-radius:5px;font-size:10.5px;color:var(--text);transition:all .15s}
.rst{font-size:11px;color:var(--ts);display:flex;align-items:center;gap:10px}
.sds{display:inline-flex;gap:2px;align-items:center}.sds i{width:6px;height:6px;border-radius:50%;font-style:normal;display:inline-block}.sds .l{background:var(--sl)}.sds .m{background:var(--sm)}.sds .h{background:var(--sh)}
/* DETAIL */
.dbk{color:var(--ts);font-size:13px;padding:6px 12px;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:var(--el);border:1px solid var(--brd);border-radius:8px}.dbk:hover{color:var(--text);border-color:var(--bl);background:var(--hov)}
.dh{display:flex;gap:24px;margin-bottom:26px}
.dn{font-family:'Fraunces',serif;font-size:28px;font-weight:700;letter-spacing:-1.2px;line-height:1.15;margin:8px 0 8px;background:linear-gradient(135deg,var(--text) 0%,var(--ts) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dn .new-badge{display:inline-block;margin-left:8px;vertical-align:middle;color:#fff !important;-webkit-text-fill-color:#fff;background:var(--accent);background-image:none}
.dd{font-size:14px;color:var(--ts);line-height:1.7;max-width:580px;margin:12px 0 18px}
.da{display:flex;gap:8px;flex-wrap:wrap}
.da button{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;transition:all .15s}
.da .p{background:var(--accent);color:#fff;border:none;transition:all .2s}.da .p:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,0.3)}
.da .p.active{background:var(--sl)}
.da .o{background:none;border:1px solid var(--brd);color:var(--ts)}.da .o:hover{border-color:var(--bl);color:var(--text)}
.da .o.active{border-color:var(--sl);color:var(--sl)}
.spb{display:flex;gap:10px;padding:14px;background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:24px}
.sps{flex:1;text-align:center;padding:10px 8px;border-radius:8px}.sps em{font-size:22px;font-weight:700;font-style:normal;display:block}.sps small{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.8px}
.sps.sl{background:var(--slb)}.sps.sl em{color:var(--sl)}.sps.sm{background:var(--smb)}.sps.sm em{color:var(--sm)}.sps.sv{background:var(--shb)}.sps.sv em{color:var(--sh)}
.st{font-family:'Fraunces',serif;font-size:19px;font-weight:700;margin-bottom:14px;letter-spacing:-0.5px}
.cmp{padding:14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:18px}
.cmp textarea{width:100%;min-height:68px;background:var(--el);border:1px solid var(--brd);border-radius:7px;padding:11px;color:var(--text);font-size:13px;resize:vertical;outline:none;font-family:inherit}
.cmp textarea:focus{border-color:rgba(255,107,53,0.5)}.cmp textarea::placeholder{color:var(--td)}
.cmpf{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-wrap:wrap;gap:8px}
.spp{display:flex;gap:4px;align-items:center;flex-wrap:wrap}.spp>span{font-size:11px;color:var(--ts);margin-right:3px}
.slb{padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;transition:all .15s}
.bps{padding:6px 15px;background:var(--accent);border-radius:7px;color:#fff;font-size:12.5px;font-weight:600;transition:opacity .15s}
.bps:disabled{opacity:0.5;cursor:not-allowed}
.cfs{display:flex;gap:4px;margin-bottom:16px;align-items:center;flex-wrap:wrap}.cfs>span{font-size:11px;color:var(--td);margin-right:2px}
.cfb{padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;background:var(--card);border:1px solid var(--brd);color:var(--ts);transition:all .15s}.cfb:hover{color:var(--ts)}.cfb.on{background:var(--el);color:var(--text);border-color:var(--bl)}
.cm{padding:14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:8px;transition:all .15s}.cm:hover{border-color:var(--bl);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.cmh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.cmu{display:flex;align-items:center;gap:8px}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.cmn{font-size:12.5px;font-weight:600}.cmt{font-size:10.5px;color:var(--ts)}
.sb{padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.cmb{font-size:13.5px;line-height:1.6;color:var(--text);transition:filter .3s}.cmb.bl{filter:blur(6px);user-select:none}

<script>
// ═══════ SUPABASE ═══════
const SB_URL='https://zqxivnhfvhgphuqmahkg.supabase.co';
const AMAZON_TAG='unreeled-20'; // Amazon Associates tag
const ANALYTICS_URL='https://unreeled-analytics.keenest.workers.dev/event';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxeGl2bmhmdmhncGh1cW1haGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTA5OTQsImV4cCI6MjA4Nzc4Njk5NH0.GlgESEQPREYYJ5dglOLSi5NOGDEnINOJU8VpKrfSiLw';
let sb,user=null,profile=null,userSubs=[],userWatchlist=[];
let authIntent='login',searchAnalyticsTimer=null,analyticsSectionObserver=null;
let reachedAnalyticsSections=new Set();
try{reachedAnalyticsSections=new Set(JSON.parse(sessionStorage.getItem('unreeled-reached-sections')||'[]'))}catch(e){}

function analyticsDevice(){
  return innerWidth<640?'mobile':innerWidth<1024?'tablet':'desktop';
}
function trackEvent(event,properties){
  const payload=JSON.stringify({event:event,page:location.pathname,device:analyticsDevice(),properties:properties||{}});
  try{
    if(navigator.sendBeacon&&navigator.sendBeacon(ANALYTICS_URL,new Blob([payload],{type:'text/plain;charset=UTF-8'})))return;
    fetch(ANALYTICS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:payload,keepalive:true}).catch(()=>{});
  }catch(e){}
}
function resultBucket(total){
  return total===0?'0':total<=5?'1-5':total<=20?'6-20':total<=50?'21-50':'51+';
}
function trackSearchUsage(source){
  clearTimeout(searchAnalyticsTimer);
  searchAnalyticsTimer=setTimeout(()=>trackEvent('search_used',{source:source,has_query:!!searchQ,result_bucket:resultBucket(feedFiltered.length)}),700);
}
function applyFilter(filter,value){
  trackEvent('filter_used',{filter:filter,value:String(value)});
  renderFeed();
}
function observeAnalyticsSections(){
  if(!('IntersectionObserver' in window))return;
  if(analyticsSectionObserver)analyticsSectionObserver.disconnect();
  analyticsSectionObserver=new IntersectionObserver(entries=>entries.forEach(entry=>{
    if(!entry.isIntersecting)return;
    const section=entry.target.dataset.analyticsSection;
    if(!section||reachedAnalyticsSections.has(section))return;
    reachedAnalyticsSections.add(section);
    sessionStorage.setItem('unreeled-reached-sections',JSON.stringify([...reachedAnalyticsSections]));
    trackEvent('section_reached',{section:section});
    analyticsSectionObserver.unobserve(entry.target);
  }),{threshold:.25});
  document.querySelectorAll('[data-analytics-section]').forEach(el=>analyticsSectionObserver.observe(el));

function toggleTheme(){
  const html=document.documentElement;
  const cur=html.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('unreeled-theme',next);
  document.getElementById('theme-toggle').innerHTML=next==='dark'?'\uD83C\uDF19':'\u2600\uFE0F';
}

// ═══════ RATINGS ═══════
async function rateRelease(rk,stars){
  if(!user)return showAuth('login');
  const{data,error}=await sb.from('ratings').upsert({user_id:user.id,release_key:rk,rating:stars},{onConflict:'user_id,release_key'}).select().single();
  if(error){console.error('Rating error:',error);toast('Error saving rating');return}
  toast('Rated '+stars+' star'+(stars!==1?'s':'')+'!');
  loadRating(rk);
}
async function loadRating(rk){
  try{
    const{data}=await sb.from('ratings').select('rating').eq('release_key',rk);
    const ratings=data||[];
    const avg=ratings.length?ratings.reduce((s,r)=>s+r.rating,0)/ratings.length:0;
    const myR=user?ratings.find(r=>r.user_id===user.id):null;
    const el=document.getElementById('rating-display');
    if(!el)return;
    let h='<div class="stars" id="star-row">';
    for(let i=1;i<=5;i++){h+='<span class="'+(myR&&myR.rating>=i?'on':'')+'" onclick="rateRelease(\''+rk+'\','+i+')">\u2605</span>'}
    h+='</div>';
    if(ratings.length)h+='<span class="avg-rating"><em>'+avg.toFixed(1)+'</em> ('+ratings.length+')</span>';
    else h+='<span class="avg-rating">No ratings yet</span>';
    el.innerHTML=h;
  }catch(e){console.error('Load rating error:',e)}
}

// ═══════ NAV ═══════
function go(p,push){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  const pg=document.getElementById('p-'+p);
  pg.classList.add('on');
  // Show skeleton while async pages load
  if(p==='profile')showSkeleton(pg,4);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const activeTab=document.querySelector('.tab[data-p="'+(p==='detail'||p==='account'||p==='profile'||p==='admin'||p==='notifications'||p==='analytics'||p==='feedback'||p==='privacy'||p==='rules'?'feed':p)+'"]');
  if(activeTab)activeTab.classList.add('on');
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('on'));
  const bp=p==='detail'||p==='profile'||p==='admin'||p==='notifications'||p==='analytics'||p==='feedback'||p==='privacy'||p==='rules'?'feed':p;
  const activeBottomNav=document.querySelector('.bnav button[data-p="'+bp+'"]');
  if(activeBottomNav)activeBottomNav.classList.add('on');
  if(push!==false&&p!==curPage)history.pushState({page:p},'','');
  curPage=p;window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('umenu').classList.remove('show');
}
window.addEventListener('popstate',e=>{go((e.state&&e.state.page)||'feed',false)});

function renderNav(){
  const el=document.getElementById('nav-r');
  if(user&&profile){
    const init=profile.username.slice(0,2).toUpperCase();
    el.innerHTML='<div class="user-pill" onclick="document.getElementById(\'umenu\').classList.toggle(\'show\')"><div class="uav" style="background:'+profile.avatar_color+'">'+init+'</div>'+esc(profile.username)+'</div>';
    document.getElementById('umenu').innerHTML='<button onclick="go(\'account\')">My Account</button><button onclick="openProfile(\''+user.id+'\',\''+esc(profile.username).replace(/'/g,"\\'")+'\')">My Profile</button><button onclick="go(\'streams\')">My Streams</button><button onclick="go(\'notifications\');renderNotifications()">Notifications</button><button onclick="go(\'feedback\');renderFeedback()">Feedback</button>'+(isAdmin()?'<button onclick="go(\'analytics\');renderAnalytics()">Analytics</button><button onclick="go(\'admin\');renderAdmin()">Admin Dashboard</button>':'')+'<hr><button onclick="doLogout()">Log Out</button>';
  } else {
    el.innerHTML='<button class="btn-a" onclick="showAuth(\'login\')">Sign In</button>';
    document.getElementById('umenu').classList.remove('show');
  }
}

function showAuth(mode){
  authIntent=mode;
  if(mode==='signup')trackEvent('signup_started',{source:'auth_modal'});

async function doMagicSignup(){
  const em=document.getElementById('a-email').value.trim();
  const un=document.getElementById('a-user').value.trim();
  if(!em)return showErr('Email is required');
  if(!un||un.length<3)return showErr('Username must be at least 3 characters');
  if(!/^[a-zA-Z0-9_]+$/.test(un))return showErr('Username: letters, numbers, underscores only');
  document.getElementById('a-btn').disabled=true;
  document.getElementById('a-btn').textContent='Sending...';
  const{error}=await sb.auth.signInWithOtp({
    email:em,
    options:{
      data:{username:un,display_name:un},

async function loadUser(){
  const{data}=await sb.auth.getUser();
  user=data.user;
  if(!user)return;
  let{data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  const meta=user.user_metadata||{};
  const idMeta=user.identities&&user.identities[0]&&user.identities[0].identity_data||{};
  // Best username from Google: full_name > name > display_name > email prefix
  const bestName=meta.full_name||meta.name||idMeta.full_name||idMeta.name||meta.display_name||meta.username||(user.email||'').split('@')[0]||'user';
  const cleanName=bestName.replace(/[^a-zA-Z0-9_ ]/g,'').replace(/\s+/g,'_').slice(0,20);

  if(!p&&user){
    // Auto-create profile for new Google/magic link users
    const colors=['#6366f1','#a855f7','#14b8a6','#f43f5e','#ec4899','#eab308','#8b5cf6','#06b6d4','#f97316','#ef4444'];
    const color=colors[Math.floor(Math.random()*colors.length)];
    const{data:np}=await sb.from('profiles').upsert({
      id:user.id,
      username:cleanName,
      avatar_color:color,
      role:'user'
    },{onConflict:'id'}).select().single();
    p=np;
  } else if(p&&p.username.startsWith('user_')&&cleanName&&!cleanName.startsWith('user')){
    // Fix auto-generated usernames with the real Google name
    await sb.from('profiles').update({username:cleanName}).eq('id',user.id);
    p.username=cleanName;
  }
  profile=p;
  const{data:s}=await sb.from('subscriptions').select('*').eq('user_id',user.id);
  userSubs=s||[];
  const{data:w}=await sb.from('watchlist').select('*').eq('user_id',user.id);
  userWatchlist=w||[];
}

  if(filterHasPoster)fl=fl.filter(r=>r.poster_url);

function relKeyLite(r){return (r.media_type||'')+'::'+((r.title||'').toLowerCase())}

function takeSectionItems(list, used, limit, predicate){
  const out=[];
  for(const r of list){
    if(predicate && !predicate(r)) continue;
    const k=relKeyLite(r);
    if(used.has(k)) continue;
    used.add(k);
    out.push(r);
    if(out.length>=limit) break;
  }
  return out;
}

function buildHomepageSections(list){
  const used = new Set();

  const tvMoments = takeSectionItems(
    list, used, 10,
    function(r){
      const kind = (((r.metadata || {}).tv_release_kind) || '').toLowerCase();
      return r.media_type === 'tv' && (
        kind === 'series_premiere' ||
        kind === 'season_premiere' ||
        kind === 'new_episode'
      );
    }
  );

  const movieNight = takeSectionItems(
    list, used, 10,
    function(r){
      return r.media_type === 'movie' || r.media_type === 'disc';
    }
  );

  const cultureMix = takeSectionItems(
    list, used, 12,
    function(r){
      return ['game','book','music','podcast','anime','boardgame'].includes(r.media_type);
    }
  );

  const newsNow = takeSectionItems(
    list, used, 6,
    function(r){
      return r.media_type === 'news';
    }
  );

  const moreToday = takeSectionItems(
    list, used, 18,
    function(){ return true; }
  );

  function typeLabel(t){
    const map = {
      game: 'Games',
      book: 'Books',
      music: 'Music',
      podcast: 'Podcasts',
      anime: 'Anime',
      boardgame: 'Board Games'
    };
    return map[t] || t;
  }

  function countTypes(items){
    const c = {};
    items.forEach(function(r){
      const t = r.media_type || 'other';
      c[t] = (c[t] || 0) + 1;
    });
    return c;
  }

  function topTypes(items){
    const counts = countTypes(items);
    return Object.entries(counts)
      .sort(function(a,b){ return b[1] - a[1]; })
      .map(function(x){ return x[0]; });
  }

  let cultureTitle = 'Culture Picks';
  let cultureSubtitle = 'Automatically selected highlights from games, books, music, podcasts, anime and more.';

  if(cultureMix.length){
    const tops = topTypes(cultureMix).slice(0,3);

    if(tops.length === 1){
      cultureTitle = typeLabel(tops[0]) + ' Today';
      cultureSubtitle = 'The biggest ' + typeLabel(tops[0]).toLowerCase() + ' releases in today\'s feed.';
    } else if(tops.length === 2){
      cultureTitle = typeLabel(tops[0]) + ' & ' + typeLabel(tops[1]);
      cultureSubtitle = 'A mixed shelf of today\'s strongest ' + typeLabel(tops[0]).toLowerCase() + ' and ' + typeLabel(tops[1]).toLowerCase() + '.';
    } else if(tops.length >= 3){
      cultureTitle = typeLabel(tops[0]) + ', ' + typeLabel(tops[1]) + ' & ' + typeLabel(tops[2]);
      cultureSubtitle = 'A mixed shelf of standout non-film releases for today.';
    }
  }

  let tvTitle = 'TV Premieres, New Seasons & Episodes';
  let tvSubtitle = 'Automatically grouped from TV releases with premiere and episode metadata.';

  if(tvMoments.length){
    const counts = {series:0, season:0, episode:0};

    tvMoments.forEach(function(r){
      const k = (((r.metadata || {}).tv_release_kind) || '').toLowerCase();
      if(k === 'series_premiere') counts.series++;
      else if(k === 'season_premiere') counts.season++;
      else if(k === 'new_episode') counts.episode++;
    });

    if(counts.series && !counts.season && !counts.episode){
      tvTitle = 'Brand New Series';
      tvSubtitle = 'Fresh TV launches starting today.';
    } else if(counts.season && !counts.series && !counts.episode){
      tvTitle = 'New Seasons Starting';
      tvSubtitle = 'Returning shows kicking off fresh seasons.';
    } else if(counts.episode && !counts.series && !counts.season){
      tvTitle = 'New Episodes Tonight';
      tvSubtitle = 'Today\'s strongest scheduled episode drops.';
    }
  }

  let movieTitle = 'Movie Night';
  let movieSubtitle = 'Top films and physical releases for the day.';

  if(movieNight.length){
    const hasDisc = movieNight.some(function(r){ return r.media_type === 'disc'; });
    const hasMovie = movieNight.some(function(r){ return r.media_type === 'movie'; });

    if(hasMovie && !hasDisc){
      movieTitle = 'Big Movies Today';
      movieSubtitle = 'Today\'s biggest film releases.';
    } else if(hasDisc && !hasMovie){
      movieTitle = 'Physical Media Picks';
      movieSubtitle = 'Standout Blu-ray, DVD and physical releases.';
    }
  }

  const sections = [];
  if(tvMoments.length >= 3) sections.push({key:'tvMoments', title:tvTitle, subtitle:tvSubtitle, items:tvMoments});
  if(movieNight.length >= 3) sections.push({key:'movieNight', title:movieTitle, subtitle:movieSubtitle, items:movieNight});
  if(cultureMix.length >= 4) sections.push({key:'cultureMix', title:cultureTitle, subtitle:cultureSubtitle, items:cultureMix});
  if(newsNow.length >= 3) sections.push({key:'newsNow', title:'Entertainment News', subtitle:'Latest entertainment headlines and updates.', items:newsNow});
  if(moreToday.length >= 6) sections.push({key:'moreToday', title:'More Releases Today', subtitle:'Everything else that did not fit the headline shelves.', items:moreToday});

  return sections;
}

function loadMoreFeed(){
  const start=feedPage*FEED_PAGE_SIZE;
  const end=start+FEED_PAGE_SIZE;
  const page=feedFiltered.slice(start,end);
  if(!page.length)return;
  const container=document.getElementById('feed-cards');
  if(!container)return;
  let h='';
  page.forEach((r,i)=>{const ri=R.indexOf(r);h+=card(r,start+i,ri>=0?'openD('+ri+')':'openD(feedFiltered['+(start+i)+'])')});
  container.insertAdjacentHTML('beforeend',h);
  feedPage++;
  // Remove sentinel if no more pages
  if(end>=feedFiltered.length){
    const sentinel=document.getElementById('feed-sentinel');
    if(sentinel)sentinel.remove();
    if(feedObserver)feedObserver.disconnect();
  }
}

function setupFeedObserver(){
  if(feedObserver)feedObserver.disconnect();
  if(!('IntersectionObserver' in window)){
    const sentinel=document.getElementById('feed-sentinel');
    if(sentinel)sentinel.innerHTML='<button onclick="loadMoreFeed()" style="padding:9px 16px;background:var(--el);border:1px solid var(--brd);border-radius:8px;color:var(--ts)">Load more releases</button>';
    return;
  }
  const sentinel=document.getElementById('feed-sentinel');
  if(!sentinel)return;
  feedObserver=new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting)loadMoreFeed();
  },{rootMargin:'200px'});
  feedObserver.observe(sentinel);
}

function findRelated(r,max){
  const genres=new Set((r.genres||[]).map(g=>g.toLowerCase()));
  if(!genres.size)return[];
  const scored=[];
  R.forEach((rel,idx)=>{
    if(rel.title===r.title&&rel.media_type===r.media_type)return;
    let score=0;
    (rel.genres||[]).forEach(g=>{if(genres.has(g.toLowerCase()))score+=2});
    if(rel.media_type===r.media_type)score+=1;
    if(score>0)scored.push({rel,idx,score});
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,max).map(s=>s.rel);
}

async function loadComments(rk){
  try{
    // Try join first
    let{data,error}=await sb.from('comments').select('*,profiles(username,avatar_color)').eq('release_key',rk).order('created_at',{ascending:false});
    if(error){
      console.warn('Join query failed, fetching separately:',error);
      // Fallback: fetch comments then profiles
      const res=await sb.from('comments').select('*').eq('release_key',rk).order('created_at',{ascending:false});
      data=res.data||[];
      if(data.length){
        const uids=[...new Set(data.map(c=>c.user_id))];
        const{data:profs}=await sb.from('profiles').select('id,username,avatar_color').in('id',uids);
        const profMap={};(profs||[]).forEach(p=>profMap[p.id]=p);
        data.forEach(c=>c.profiles=profMap[c.user_id]||{username:'anon',avatar_color:'#ff6b35'});
      }
    }
    detailComments=data||[];
    const el=document.getElementById('cmt-count');
    if(el)el.textContent='Discussion ('+detailComments.length+')';
    renderComments();
  }catch(e){console.error('Load comments exception:',e);detailComments=[];renderComments()}
}

      html+='</div>';

    return html;
  }

  let html='';
  topLevel.forEach(c=>{
    html+=renderOne(c,false);
    const reps=replies[c.id]||[];

function getAllGenreData(){
  // Collect genres from today + all historical dates
  const genreMap={};
  function addReleases(releases,date){
    (releases||[]).forEach(r=>{
      (r.genres||[]).forEach(g=>{
        if(!genreMap[g])genreMap[g]={count:0,types:{},dates:{},releases:[]};
        genreMap[g].count++;
        genreMap[g].types[r.media_type]=(genreMap[g].types[r.media_type]||0)+1;
        genreMap[g].dates[date]=(genreMap[g].dates[date]||0)+1;
        if(genreMap[g].releases.length<50)genreMap[g].releases.push(r);
      });
    });
  }
  addReleases(R,vd);
  if(D.historical){
    for(const[date,releases]of Object.entries(D.historical)){
      if(date!==vd)addReleases(releases,date);
    }
  }
  return genreMap;
}

function renderGenres(){
  const genreMap=getAllGenreData();
  let sorted=Object.entries(genreMap);

  // Sort
  if(genreSort==='count')sorted.sort((a,b)=>b[1].count-a[1].count);
  else if(genreSort==='az')sorted.sort((a,b)=>a[0].localeCompare(b[0]));
  else if(genreSort==='za')sorted.sort((a,b)=>b[0].localeCompare(a[0]));
  else if(genreSort==='variety')sorted.sort((a,b)=>Object.keys(b[1].types).length-Object.keys(a[1].types).length);

  let h='<h1 class="hero">\uD83C\uDFAD Genres</h1><p class="sub">Browse releases by genre across all dates</p>';

  if(!genreFilter){
    // Sort bar
    h+='<div style="display:flex;gap:6px;margin:12px 0 16px;flex-wrap:wrap">';
    [{k:'count',l:'\uD83D\uDD25 Most releases'},{k:'az',l:'A \u2192 Z'},{k:'za',l:'Z \u2192 A'},{k:'variety',l:'\uD83C\uDF10 Most variety'}].forEach(s=>{
      h+='<button onclick="genreSort=\''+s.k+'\';renderGenres()" style="padding:5px 12px;font-size:11px;border-radius:6px;font-weight:600;'+(genreSort===s.k?'background:var(--accent);color:#fff;border:1px solid var(--accent)':'background:var(--el);color:var(--td);border:1px solid var(--brd)')+'">'+s.l+'</button>';
    });
    h+='</div>';

    // Subscribed genres banner
    const subbedGenres=sorted.filter(([g])=>isSubbed('genre',g));
    if(subbedGenres.length){
      h+='<div style="padding:12px 14px;background:var(--agl);border:1px solid var(--accent);border-radius:10px;margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px">\uD83D\uDD14 Your subscribed genres</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
      subbedGenres.forEach(([g])=>{h+='<span onclick="genreFilter=\''+esc(g).replace(/'/g,"\\'")+'\';renderGenres()" style="padding:4px 10px;background:var(--accent);color:#fff;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">'+getGenreIcon(g)+' '+esc(g)+'</span>'});
      h+='</div></div>';
    }

    // Stats
    h+='<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap"><div style="padding:10px 16px;background:var(--card);border:1px solid var(--brd);border-radius:8px;text-align:center"><div style="font-size:18px;font-weight:700">'+sorted.length+'</div><div style="font-size:10px;color:var(--td)">Genres</div></div>';
    const totalReleases=sorted.reduce((s,e)=>s+e[1].count,0);
    const totalDates=new Set(sorted.flatMap(([,info])=>Object.keys(info.dates))).size;
    h+='<div style="padding:10px 16px;background:var(--card);border:1px solid var(--brd);border-radius:8px;text-align:center"><div style="font-size:18px;font-weight:700">'+totalReleases.toLocaleString()+'</div><div style="font-size:10px;color:var(--td)">Total</div></div>';
    h+='<div style="padding:10px 16px;background:var(--card);border:1px solid var(--brd);border-radius:8px;text-align:center"><div style="font-size:18px;font-weight:700">'+totalDates+'</div><div style="font-size:10px;color:var(--td)">Days</div></div></div>';

    // Genre grid
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">';
    sorted.forEach(([name,info])=>{
      const icon=getGenreIcon(name);
      const typeIcons=Object.keys(info.types).map(t=>(MC[t]||{}).i||'').join(' ');
      const maxType=Object.entries(info.types).sort((a,b)=>b[1]-a[1])[0];
      const maxColor=maxType?(MC[maxType[0]]||{}).c||'#666':'#666';
      const subbed=isSubbed('genre',name);
      h+='<div onclick="genreFilter=\''+esc(name).replace(/'/g,"\\'")+'\';renderGenres()" style="padding:14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;cursor:pointer;transition:all .15s;position:relative" onmouseover="this.style.borderColor=\''+maxColor+'\'" onmouseout="this.style.borderColor=\'var(--brd)\'">';
      if(subbed)h+='<div style="position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--accent);border-radius:50%"></div>';
      h+='<div style="font-size:20px;margin-bottom:6px">'+icon+'</div>';
      h+='<div style="font-size:13px;font-weight:600;margin-bottom:2px">'+esc(name)+'</div>';
      h+='<div style="font-size:11px;color:var(--td);margin-bottom:6px">'+info.count.toLocaleString()+' release'+(info.count!==1?'s':'')+'</div>';
      // Mini type bar
      const total=info.count;
      h+='<div style="display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px">';
      for(const[t,cnt]of Object.entries(info.types).sort((a,b)=>b[1]-a[1])){
        const pct=Math.max(cnt/total*100,3);
        h+='<div style="width:'+pct+'%;background:'+(MC[t]||{}).c+';min-width:3px" title="'+(MC[t]||{}).l+': '+cnt+'"></div>';
      }
      h+='</div>';
      h+='<div style="font-size:10px;margin-top:6px">'+typeIcons+'</div>';
      h+='</div>';
    });
    h+='</div>';
  } else {
    // ═══════ GENRE DETAIL PAGE ═══════
    const info=genreMap[genreFilter];
    if(!info){genreFilter=null;renderGenres();return}
    const icon=getGenreIcon(genreFilter);
    const subbed=isSubbed('genre',genreFilter);

    h+='<button onclick="genreFilter=null;renderGenres()" style="display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--el);border:1px solid var(--brd);border-radius:8px;color:var(--ts);font-size:13px;font-weight:600;margin-bottom:16px">\u2190 All Genres</button>';

    // Header
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px"><span style="font-size:32px">'+icon+'</span><h2 style="font-family:\'Fraunces\',serif;font-size:26px">'+esc(genreFilter)+'</h2></div>';
    h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px"><p style="font-size:13px;color:var(--td)">'+info.count.toLocaleString()+' releases across '+Object.keys(info.dates).length+' days</p>';
    h+='<button onclick="toggleSub(\'genre\',\''+esc(genreFilter).replace(/'/g,"\\'")+'\');setTimeout(renderGenres,300)" style="padding:5px 14px;font-size:11px;border-radius:6px;font-weight:600;'+(subbed?'background:var(--accent);color:#fff;border:1px solid var(--accent)':'background:var(--el);color:var(--td);border:1px solid var(--brd)')+'">'+(subbed?'\u2713 Subscribed':'\uD83D\uDD14 Subscribe')+'</button></div>';

    // Media type breakdown chart
    h+='<div style="padding:16px;background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:16px">';
    h+='<div style="font-size:13px;font-weight:600;margin-bottom:12px">\uD83D\uDCCA Media Type Breakdown</div>';
    const typeEntries=Object.entries(info.types).sort((a,b)=>b[1]-a[1]);
    typeEntries.forEach(([t,cnt])=>{
      const mc=MC[t]||{i:'?',l:t,c:'#666'};
      const pct=Math.round(cnt/info.count*100);
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      h+='<span style="width:28px;text-align:center">'+mc.i+'</span>';
      h+='<span style="width:70px;font-size:12px;font-weight:600">'+mc.l+'</span>';
      h+='<div style="flex:1;height:10px;background:var(--el);border-radius:5px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+mc.c+';border-radius:5px;transition:width .3s"></div></div>';
      h+='<span style="width:65px;text-align:right;font-size:12px;color:var(--td)">'+cnt+' ('+pct+'%)</span>';
      h+='</div>';
    });
    h+='</div>';

    // Daily activity chart
    const dateEntries=Object.entries(info.dates).sort((a,b)=>a[0].localeCompare(b[0]));
    if(dateEntries.length>1){
      h+='<div style="padding:16px;background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:16px">';
      h+='<div style="font-size:13px;font-weight:600;margin-bottom:12px">\uD83D\uDCC8 Daily Activity</div>';
      const maxDay=Math.max(...dateEntries.map(e=>e[1]));
      h+='<div style="display:flex;align-items:flex-end;gap:2px;height:80px">';
      dateEntries.forEach(([date,cnt])=>{
        const pct=Math.round(cnt/maxDay*100);
        h+='<div style="flex:1;min-width:6px;max-width:24px" title="'+date+': '+cnt+'"><div style="height:'+pct+'%;min-height:3px;background:var(--accent);border-radius:2px 2px 0 0;transition:height .3s"></div></div>';
      });
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:9px;color:var(--td)">'+dateEntries[0][0].slice(5)+'</span><span style="font-size:9px;color:var(--td)">'+dateEntries[dateEntries.length-1][0].slice(5)+'</span></div>';
      h+='</div>';
    }

    // Related genres
    const relatedGenres=[];
    const myReleases=new Set(info.releases.map(r=>r.title));
    for(const[g,gInfo]of Object.entries(genreMap)){
      if(g===genreFilter)continue;
      const overlap=gInfo.releases.filter(r=>myReleases.has(r.title)).length;
      if(overlap>0)relatedGenres.push({name:g,overlap,count:gInfo.count});
    }
    relatedGenres.sort((a,b)=>b.overlap-a.overlap);
    if(relatedGenres.length){
      h+='<div style="padding:16px;background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:16px">';
      h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">\uD83C\uDF10 Related Genres</div>';
      h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
      relatedGenres.slice(0,12).forEach(rg=>{
        h+='<span onclick="genreFilter=\''+esc(rg.name).replace(/'/g,"\\'")+'\';renderGenres()" style="padding:5px 12px;background:var(--el);border:1px solid var(--brd);border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor=\'var(--bl)\'" onmouseout="this.style.borderColor=\'var(--brd)\'">'+getGenreIcon(rg.name)+' '+esc(rg.name)+' <span style="color:var(--td)">('+rg.overlap+' shared)</span></span>';
      });
      h+='</div></div>';
    }

    // Releases list
    h+='<div class="st">Releases ('+info.count+')</div>';
    const todayFiltered=R.filter(r=>(r.genres||[]).includes(genreFilter));
    if(todayFiltered.length){
      h+='<div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px">\uD83D\uDFE0 Today ('+todayFiltered.length+')</div>';
      todayFiltered.forEach((r,i)=>{const ri=R.indexOf(r);h+=card(r,i,ri>=0?'openD('+ri+')':'')});
    }
    // Historical releases
    if(D.historical){
      const histDates=Object.keys(D.historical).filter(d=>d!==vd).sort().reverse();
      let shown=0;
      histDates.forEach(date=>{
        if(shown>=30)return;
        const dayReleases=(D.historical[date]||[]).filter(r=>(r.genres||[]).includes(genreFilter));
        if(!dayReleases.length)return;
        h+='<div style="font-size:12px;font-weight:600;color:var(--td);margin:12px 0 8px">'+fmtD(date)+' ('+dayReleases.length+')</div>';
        dayReleases.slice(0,10).forEach((r,i)=>{h+=card(r,i,'')});
        shown+=dayReleases.length;
      });
    }
    if(!info.count)h+='<div class="empty"><span class="empty-icon">\uD83C\uDFAD</span><h2>No releases</h2><p>No releases in this genre.</p></div>';
  }
  document.getElementById('p-genres').innerHTML=h;
}

// ═══════ USER PROFILE ═══════
async function openProfile(userId,username){
  go('profile');
  const pg=document.getElementById('p-profile');
  showSkeleton(pg,5);

  try{
    // Fetch user's profile
    const{data:prof}=await sb.from('profiles').select('*').eq('id',userId).single();
    if(!prof){pg.innerHTML='<div class="empty"><span class="empty-icon">\uD83D\uDC64</span><h2>User not found</h2></div>';return}

    // Fetch user's comments
    const{data:comments}=await sb.from('comments').select('*').eq('user_id',userId).eq('hidden',false).order('created_at',{ascending:false}).limit(20);

    // Fetch user's ratings
    const{data:ratings}=await sb.from('ratings').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(20);

    const init=prof.username.slice(0,2).toUpperCase();
    const joined=new Date(prof.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'});

    let h='<button class="dbk" onclick="history.back()">\u2190 Back</button>';
    // Profile header
    h+='<div style="text-align:center;padding:24px 0 16px"><div class="av" style="background:'+prof.avatar_color+';width:64px;height:64px;font-size:24px;border-radius:16px;margin:0 auto 12px">'+init+'</div>';
    h+='<h1 style="font-family:\'Fraunces\',serif;font-size:24px">'+esc(prof.username)+'</h1>';
    h+='<p style="font-size:12px;color:var(--td);margin-top:4px">Joined '+joined+'</p>';
    // Follow button (not on own profile)
    if(user&&userId!==user.id){
      const flw=isFollowing(userId);
      h+='<div style="margin-top:10px"><button onclick="toggleFollow(\''+userId+'\',\''+esc(prof.username).replace(/'/g,"\\\'")+'\');setTimeout(()=>openProfile(\''+userId+'\',\''+esc(prof.username).replace(/'/g,"\\\'")+'\'),300)" style="padding:6px 20px;border-radius:8px;font-size:12px;font-weight:600;'+(flw?'background:var(--accent);color:#fff;border:1px solid var(--accent)':'background:var(--el);color:var(--td);border:1px solid var(--brd)')+'">'+(flw?'\u2713 Following':'+ Follow')+'</button></div>';
    }
    h+='</div>';

    // Stats
    const commentCount=(comments||[]).length;
    const ratingCount=(ratings||[]).length;
    const avgRating=ratingCount?((ratings||[]).reduce((s,r)=>s+r.rating,0)/ratingCount).toFixed(1):'—';
    h+='<div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px">';
    h+='<div style="text-align:center;padding:12px 20px;background:var(--card);border:1px solid var(--brd);border-radius:10px"><div style="font-size:20px;font-weight:700">'+commentCount+'</div><div style="font-size:10px;color:var(--td)">Comments</div></div>';
    h+='<div style="text-align:center;padding:12px 20px;background:var(--card);border:1px solid var(--brd);border-radius:10px"><div style="font-size:20px;font-weight:700">'+ratingCount+'</div><div style="font-size:10px;color:var(--td)">Ratings</div></div>';
    h+='<div style="text-align:center;padding:12px 20px;background:var(--card);border:1px solid var(--brd);border-radius:10px"><div style="font-size:20px;font-weight:700">\u2605 '+avgRating+'</div><div style="font-size:10px;color:var(--td)">Avg Rating</div></div>';
    h+='</div>';

    // Recent comments
    h+='<div class="st">\uD83D\uDCAC Recent Comments</div>';
    if(commentCount){
      (comments||[]).slice(0,10).forEach(c=>{
        const s=SP[c.spoiler_level]||SP.none;
        h+='<div style="padding:10px 14px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:6px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:var(--td)">'+c.release_key.split(':').pop()+'</span><span class="sb" style="font-size:10px;background:'+s.bg+';color:'+s.c+';border:1px solid '+s.b+'">'+s.l+'</span></div>';
        h+='<div style="font-size:13px">'+esc((c.body||'').slice(0,150))+'</div>';
        h+='<div style="font-size:10px;color:var(--td);margin-top:4px">'+timeAgo(c.created_at)+'</div>';
        h+='</div>';
      });
    } else {h+='<p style="color:var(--td);font-size:13px;padding:16px 0">No comments yet.</p>'}

    // Recent ratings
    h+='<div class="st" style="margin-top:16px">\u2B50 Recent Ratings</div>';
    if(ratingCount){
      (ratings||[]).slice(0,10).forEach(r=>{
        const stars='\u2605'.repeat(r.rating)+'\u2606'.repeat(5-r.rating);
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px">';
        h+='<span style="font-size:12px">'+r.release_key.split(':').pop()+'</span>';
        h+='<span style="color:#f0c038;font-size:14px">'+stars+'</span>';
        h+='</div>';
      });
    } else {h+='<p style="color:var(--td);font-size:13px;padding:16px 0">No ratings yet.</p>'}

    pg.innerHTML=h;
  }catch(e){console.error('Profile error:',e);pg.innerHTML='<div class="empty"><span class="empty-icon">\uD83D\uDC64</span><h2>Error loading profile</h2><p>'+e.message+'</p></div>'}
}

// ═══════ ADMIN DASHBOARD ═══════
async function renderAdmin(){

// ═══════ FEEDBACK ═══════
function renderFeedback(){
  let h='<h1 class="hero">\uD83D\uDCEC Feedback</h1><p class="sub">Report a bug, request a feature, or share your thoughts</p>';

  // Feedback form
  h+='<div style="padding:18px;background:var(--card);border:1px solid var(--brd);border-radius:12px;margin-bottom:20px">';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="cfb on" id="fb-type-bug" onclick="pickFbType(\'bug\',this)">\uD83D\uDC1B Bug Report</button><button class="cfb" id="fb-type-feature" onclick="pickFbType(\'feature\',this)">\u2728 Feature Request</button><button class="cfb" id="fb-type-general" onclick="pickFbType(\'general\',this)">\uD83D\uDCAC General</button></div>';
  if(!user)h+='<input class="finput" id="fb-email" placeholder="Your email (optional)" type="email">';
  h+='<input class="finput" id="fb-subject" placeholder="Subject (short summary)" maxlength="200">';
  h+='<textarea class="finput" id="fb-body" style="min-height:100px;resize:vertical" placeholder="Describe the issue or your idea in detail (min 10 characters)..."></textarea>';
  h+='<div class="ferr" id="fb-err"></div>';
  h+='<button class="fbtn" id="fb-btn" onclick="submitFeedback()">Submit Feedback</button>';
  h+='</div>';

  // Show user's previous feedback
  if(user){
    h+='<div id="my-feedback"><p style="color:var(--td);font-size:13px">Loading your submissions...</p></div>';
  }

  // Admin: all feedback
  if(isAdmin()){
    h+='<div id="all-feedback" style="margin-top:24px"><p style="color:var(--td);font-size:13px">Loading all feedback...</p></div>';
  }

  document.getElementById('p-feedback').innerHTML=h;
  if(user)loadMyFeedback();
  if(isAdmin())loadAllFeedback();
}

let fbType='bug';
function pickFbType(type,btn){
  fbType=type;
  document.querySelectorAll('#fb-type-bug,#fb-type-feature,#fb-type-general').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function submitFeedback(){
  const subject=document.getElementById('fb-subject').value.trim();
  const body=document.getElementById('fb-body').value.trim();
  const emailEl=document.getElementById('fb-email');
  const email=emailEl?emailEl.value.trim():(user?user.email:'');
  const err=document.getElementById('fb-err');
  err.classList.remove('show');

  if(!subject||subject.length<3){err.textContent='Subject must be at least 3 characters';err.classList.add('show');return}
  if(!body||body.length<10){err.textContent='Description must be at least 10 characters';err.classList.add('show');return}

  const btn=document.getElementById('fb-btn');
  btn.disabled=true;btn.textContent='Submitting...';

  try{
    const row={feedback_type:fbType,subject:subject,body:body};
    if(user)row.user_id=user.id;
    if(email)row.email=email;
    const{error}=await sb.from('feedback').insert(row);
    btn.disabled=false;btn.textContent='Submit Feedback';
    if(error){err.textContent='Error: '+error.message;err.classList.add('show');return}
    document.getElementById('fb-subject').value='';
    document.getElementById('fb-body').value='';
    toast('\uD83D\uDCEC Feedback submitted! Thank you.');
    if(user)loadMyFeedback();
    if(isAdmin())loadAllFeedback();
  }catch(e){
    btn.disabled=false;btn.textContent='Submit Feedback';
    err.textContent='Error submitting feedback';err.classList.add('show');
  }
}

async function loadMyFeedback(){
  const{data}=await sb.from('feedback').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(10);
  const el=document.getElementById('my-feedback');
  if(!el)return;
  if(!data||!data.length){el.innerHTML='<p style="color:var(--td);font-size:13px">No previous submissions.</p>';return}
  let h='<div class="st" style="margin-top:16px">My Submissions</div>';
  data.forEach(f=>{
    const typeIcon=f.feedback_type==='bug'?'\uD83D\uDC1B':f.feedback_type==='feature'?'\u2728':'\uD83D\uDCAC';
    const statusColor=f.status==='open'?'var(--accent)':f.status==='in_progress'?'var(--sm)':f.status==='resolved'?'var(--sl)':'var(--td)';

async function loadAllFeedback(){

  data.forEach(f=>{

    h+='<div style="font-size:11px;color:var(--td);margin-bottom:4px">'+esc(un)+' \u00B7 '+timeAgo(f.created_at)+'</div>';
    h+='<p style="font-size:12px;color:var(--ts);line-height:1.5;margin-bottom:8px">'+esc(f.body)+'</p>';

    });

async function updateFeedbackStatus(fid,status){
  await sb.from('feedback').update({status:status}).eq('id',fid);
  toast('Status updated to '+status);
  loadAllFeedback();
}

function promptAdminNote(fid){
  const note=prompt('Admin reply/note:');
  if(note===null)return;
  sb.from('feedback').update({admin_notes:note}).eq('id',fid).then(()=>{
    toast('Note saved');
    loadAllFeedback();
  });
}

v><div class="arcd-t">'+ti+'</div></div>'});h+='</div>'}document.getElementById('p-archive').innerHTML=h}

// ═══════ CALENDAR ═══════
let calYear,calMonth;
(function(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth()})();

function renderCalendar(){
  const ds=D.archive?D.archive.dates||[]:[];
  const dateMap={};ds.forEach(d=>dateMap[d.date]=d);
  const today=new Date().toISOString().slice(0,10);
  const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];

  let h='<h1 class="hero">\uD83D\uDCC5 Release Calendar</h1><p class="sub">Visual overview of daily releases</p>';
  h+='<div class="cal"><div class="cal-hd"><button onclick="calPrev()">\u2190 Prev</button><h2>'+mn[calMonth]+' '+calYear+'</h2><button onclick="calNext()">Next \u2192</button></div>';

  // Day of week headers
  h+='<div class="cal-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>h+='<div class="cal-dow">'+d+'</div>');

  // Calculate first day and total days
  const first=new Date(calYear,calMonth,1).getDay();
  const totalDays=new Date(calYear,calMonth+1,0).getDate();

  // Empty cells before first day
  for(let i=0;i<first;i++)h+='<div class="cal-day empty"></div>';

  // Day cells
  for(let d=1;d<=totalDays;d++){
    const ds2=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const info=dateMap[ds2];
    const isToday=ds2===today;
    const hasData=!!info;

    const isFuture=ds2>today;
    const daysUntil=isFuture?Math.ceil((new Date(ds2+'T12:00:00')-new Date(today+'T12:00:00'))/(86400000)):0;
    h+='<div class="cal-day'+(hasData?' has':'')+(isToday?' today':'')+(isFuture&&!hasData?' future':'')+'"'+(hasData?' onclick="loadDate(\''+ds2+'\');go(\'feed\')"':'')+'>';
    h+='<div class="cd-num">'+d+'</div>';
    if(info){
      h+='<div class="cd-ct">'+info.total+'</div>';
      h+='<div class="cd-dots">';
      const types=info.types||{};
      for(const[t,cnt]of Object.entries(types)){
        const col=(MC[t]||{}).c||'#666';
        if(cnt>0)h+='<span style="background:'+col+'" title="'+((MC[t]||{}).l||t)+': '+cnt+'"></span>';
      }
      h+='</div>';
    } else if(isFuture&&daysUntil<=14){
      h+='<div class="cal-countdown">in '+daysUntil+'d</div>';
    }
    h+='</div>';
  }

  h+='</div>';

  // Legend
  h+='<div class="cal-legend">';
  for(const[t,c]of Object.entries(MC)){
    h+='<span><i style="background:'+c.c+'"></i>'+c.l+'</span>';
  }
  h+='</div></div>';

  // Upcoming section — show next 7 days with data
  const upcoming=[];
  for(let i=0;i<30;i++){
    const nd=new Date();nd.setDate(nd.getDate()+i);
    const nds=nd.toISOString().slice(0,10);
    if(dateMap[nds])upcoming.push(dateMap[nds]);
    if(upcoming.length>=5)break;
  }
  if(upcoming.length){
    h+='<div class="sect">\uD83D\uDD1C Upcoming Days with Releases</div>';
    h+='<div class="arcg">';
    upcoming.forEach(d=>{
      const il=d.date===D.latest_date;
      const ti=Object.keys(d.types||{}).map(t=>'<span>'+(MC[t]||{}).i+'</span>').join('');
      h+='<div class="arcd'+(il?' now':'')+'" onclick="loadDate(\''+d.date+'\');go(\'feed\')"><div class="arcd-dt">'+fmtD(d.date)+'</div><div class="arcd-n">'+d.total+'</div><div class="arcd-l">releases</div><div class="arcd-t">'+ti+'</div></div>';
    });
    h+='</div>';
  }

  document.getElementById('p-calendar').innerHTML=h;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()}

function openWatchlistItem(rk,title,mtype){
  const parts=rk.split(':');
  const dateStr=parts[0];
  const tl=title.toLowerCase();
  // Try the original date
  if(D.historical&&D.historical[dateStr]){
    const rel=D.historical[dateStr];
    const idx=rel.findIndex(r=>(r.title||'').toLowerCase()===tl&&r.media_type===mtype);
    if(idx>=0){vd=dateStr;R=rel;openD(idx);return}
  }
  // Search all dates
  for(const d of dates){
    if(D.historical&&D.historical[d]){
      const rel=D.historical[d];
      const idx=rel.findIndex(r=>(r.title||'').toLowerCase()===tl&&r.media_type===mtype);
      if(idx>=0){vd=d;R=rel;openD(idx);return}

  // Not in processed data — rebuild from watchlist stored data

function buildWeeklyRecap(){
  // Build recap from all available data
  const allReleases=[];
  if(D.historical){
    const now=new Date();
    const weekAgo=new Date(now.getTime()-7*24*60*60*1000);
    for(const[date,releases]of Object.entries(D.historical)){
      const d=new Date(date+'T12:00:00');
      if(d>=weekAgo)releases.forEach(r=>allReleases.push(r));
    }
  }
  if(!allReleases.length)R.forEach(r=>allReleases.push(r));

  // Stats
  const typeCount={};
  const genreCount={};
  allReleases.forEach(r=>{
    typeCount[r.media_type]=(typeCount[r.media_type]||0)+1;
    (r.genres||[]).forEach(g=>genreCount[g]=(genreCount[g]||0)+1);
  });

  const topType=Object.entries(typeCount).sort((a,b)=>b[1]-a[1])[0];
  const topGenres=Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const withPosters=allReleases.filter(r=>r.poster_url).length;
  const posterPct=Math.round(withPosters/allReleases.length*100);

  let h='<div style="padding:16px;background:var(--card);border:1px solid var(--brd);border-radius:12px">';

  // Summary stats
  h+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">';
  h+='<div style="flex:1;min-width:80px;text-align:center;padding:8px;background:var(--el);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--accent)">'+allReleases.length+'</div><div style="font-size:10px;color:var(--td)">Releases</div></div>';
  h+='<div style="flex:1;min-width:80px;text-align:center;padding:8px;background:var(--el);border-radius:8px"><div style="font-size:20px;font-weight:700">'+Object.keys(typeCount).length+'</div><div style="font-size:10px;color:var(--td)">Media Types</div></div>';
  h+='<div style="flex:1;min-width:80px;text-align:center;padding:8px;background:var(--el);border-radius:8px"><div style="font-size:20px;font-weight:700">'+Object.keys(genreCount).length+'</div><div style="font-size:10px;color:var(--td)">Genres</div></div>';
  h+='</div>';

  // Top category
  if(topType){
    const mc=MC[topType[0]]||{i:'?',l:topType[0]};
    h+='<div style="font-size:12px;margin-bottom:10px">\uD83C\uDFC6 Top category: <strong>'+mc.i+' '+mc.l+'</strong> with '+topType[1]+' releases</div>';
  }

  // Top genres bar
  if(topGenres.length){
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:6px">Top Genres</div>';
    topGenres.forEach(([g,cnt])=>{
      const pct=Math.round(cnt/allReleases.length*100);
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      h+='<span style="width:14px;text-align:center;font-size:11px">'+getGenreIcon(g)+'</span>';
      h+='<span style="width:80px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(g)+'</span>';
      h+='<div style="flex:1;height:6px;background:var(--el);border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--accent);border-radius:3px"></div></div>';
      h+='<span style="font-size:10px;color:var(--td);width:30px;text-align:right">'+cnt+'</span>';
      h+='</div>';
    });
  }

  // Media type breakdown
  h+='<div style="font-size:12px;font-weight:600;margin:10px 0 6px">Media Breakdown</div>';
  h+='<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px">';
  for(const[t,cnt]of Object.entries(typeCount).sort((a,b)=>b[1]-a[1])){
    const pct=Math.max(cnt/allReleases.length*100,2);

const deferNonCritical=(cb)=>('requestIdleCallback' in window)?requestIdleCallback(cb,{timeout:1200}):setTimeout(cb,16);

async function initSupabase(){
  if(!window.supabase){
    console.warn('Supabase client failed to load; account features are unavailable.');
    toast('Account features are temporarily unavailable');
    return;
  }
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{storageKey:"sb-unreeled-auth",autoRefreshToken:true,persistSession:true,detectSessionInUrl:true}});
    await loadUser();
    if(user)await loadFollowing();
    if(user)await loadWatched();
    renderNav();renderStreams();renderAccount();renderFeed();
    sb.auth.onAuthStateChange(async(event)=>{
      if(event==='SIGNED_IN'||event==='SIGNED_OUT'||event==='TOKEN_REFRESHED'){
        await loadUser();
        if(user){await loadFollowing();await loadWatched()}
        renderNav();renderStreams();renderAccount();renderFeed();
        if(event==='SIGNED_IN'&&user){
          const signupMethod=localStorage.getItem('unreeled-signup-pending');
          if(signupMethod){
            trackEvent('signup_completed',{method:signupMethod});
            localStorage.removeItem('unreeled-signup-pending');
          }
          closeModal();
          toast('Welcome'+(profile?' back, '+profile.username:'')+'!');
        }
      }
    });
  }catch(error){
    console.error('Supabase initialization failed:',error);
    toast('Account features are temporarily unavailable');
  }
}

document.addEventListener('DOMContentLoaded',async()=>{
  // Clean auth tokens from URL hash
  if(window.location.hash&&(window.location.hash.includes('access_token')||window.location.hash.includes('type=recovery'))){
    setTimeout(()=>{history.replaceState(null,'',window.location.pathname)},100);

  renderNav();renderFeed();

function getDismissedRecs(){try{return JSON.parse(localStorage.getItem('unreeled-dismissed-recs')||'[]')}catch(e){return[]}}
function dismissRec(title){
  const d=getDismissedRecs();
  d.push(title.toLowerCase());
  localStorage.setItem('unreeled-dismissed-recs',JSON.stringify(d.slice(-100)));
  renderFeed();
  toast('Won\'t show "'+title+'" again');
}
function clearDismissedRecs(){localStorage.removeItem('unreeled-dismissed-recs');renderFeed();toast('Recommendations reset')}

function getRecommendations(max){
  if(!user||(!userWatchlist.length&&!userWatched.length))return[];
  const dismissed=getDismissedRecs();
  // Collect genres and types from watchlist + watched
  const genreScore={};
  const typeScore={};
  const seen=new Set();

  [...userWatchlist,...userWatched].forEach(w=>{
    seen.add((w.release_title||'').toLowerCase());
    // Find in current releases for genre info
    const match=R.find(r=>r.title&&r.title.toLowerCase()===(w.release_title||'').toLowerCase());
    if(match){
      (match.genres||[]).forEach(g=>{genreScore[g]=(genreScore[g]||0)+2});
      typeScore[match.media_type]=(typeScore[match.media_type]||0)+1;
    }
    typeScore[w.media_type]=(typeScore[w.media_type]||0)+1;
  });

  // Also use subscriptions
  userSubs.filter(s=>s.subscription_type==='genre').forEach(s=>{
    genreScore[s.subscription_value]=(genreScore[s.subscription_value]||0)+3;
  });

  // Score all releases
  const scored=[];
  R.forEach((r,idx)=>{
    const tl=(r.title||'').toLowerCase();
    if(seen.has(tl))return;
    if(dismissed.includes(tl))return;
    let score=0;
    (r.genres||[]).forEach(g=>{score+=(genreScore[g]||0)});
    score+=(typeScore[r.media_type]||0)*0.5;
    score+=((r.metadata||{}).popularity||0)*0.001;
    if(score>0)scored.push({r,idx,score});
  });

  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,max);
}

let onboardingTimer=null;
const onboardSteps=[
  {icon:'\uD83C\uDF89',title:'Welcome to Unreeled!',body:'Your daily tracker for movies, TV, books, games, anime, music and podcasts. Let\'s get you set up in 30 seconds.'},
  {icon:'\uD83D\uDCE1',title:'Subscribe to Streams',body:'Pick your favorite media types to get personalized daily digests. Head to the Streams tab to subscribe.'},

];

function showOnboarding(){
  if(!shouldOfferOnboarding())return;
  if(onboardingTimer){clearTimeout(onboardingTimer);onboardingTimer=null}
  onboardStep=0;
  renderOnboardStep();
}

function shouldOfferOnboarding(){
  const authModal=document.getElementById('auth-modal');
  const authOpen=authModal&&authModal.classList.contains('show');
  return !authOpen&&!localStorage.getItem('unreeled-onboarded')&&!(user&&profile&&profile.onboarding_complete);
}

function scheduleOnboarding(delay){
  if(!shouldOfferOnboarding()||onboardingTimer)return;
  onboardingTimer=setTimeout(()=>{onboardingTimer=null;showOnboarding()},delay||1500);
}

function offerOnboarding(){
  if(!shouldOfferOnboarding())return false;
  showOnboarding();
  return true;
}

function renderOnboardStep(){
  const s=onboardSteps[onboardStep];
  const isLast=onboardStep===onboardSteps.length-1;
  let dots='<div class="onboard-steps">';
  onboardSteps.forEach((_,i)=>{dots+='<span class="'+(i===onboardStep?'on':'')+'"></span>'});
  dots+='</div>';

  const el=document.getElementById('onboard-overlay');
  el.innerHTML='<div class="onboard-card"><div style="font-size:48px;margin-bottom:12px">'+s.icon+'</div><h2>'+s.title+'</h2><p>'+s.body+'</p>'+dots+'<div style="display:flex;gap:8px;justify-content:center">'+(onboardStep>0?'<button onclick="onboardStep--;renderOnboardStep()" style="padding:8px 20px;background:var(--el);border:1px solid var(--brd);border-radius:8px;font-size:13px;color:var(--td)">Back</button>':'')+'<button onclick="'+(isLast?'finishOnboarding()':'onboardStep++;renderOnboardStep()')+'" style="padding:8px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600">'+(isLast?'Get Started!':'Next')+'</button></div><button onclick="finishOnboarding()" style="margin-top:12px;font-size:11px;color:var(--td);background:none;border:none;cursor:pointer">Skip</button></div>';
  el.style.display='flex';
}

async function finishOnboarding(){
  if(onboardingTimer){clearTimeout(onboardingTimer);onboardingTimer=null}
  document.getElementById('onboard-overlay').style.display='none';
  localStorage.setItem('unreeled-onboarded','1');
  if(user){

// ═══════ TRENDING NOTIFICATIONS ═══════
function checkTrendingWatchlist(){
  if(!user||!userWatchlist.length)return;
  const TR=D.trending||[];
  if(!TR.length)return;
  const notified=JSON.parse(localStorage.getItem('unreeled-trend-notified')||'[]');
  const newTrending=[];

  userWatchlist.forEach(w=>{
    const title=(w.release_title||'').toLowerCase();
    TR.forEach(t=>{
      const tTitle=(t.title||'').toLowerCase();
      if(title===tTitle&&!notified.includes(tTitle)){
        newTrending.push(t.title);
        notified.push(tTitle);
      }
    });
  });

  if(newTrending.length){
    localStorage.setItem('unreeled-trend-notified',JSON.stringify(notified.slice(-50)));
    // Show toast for each
    if(newTrending.length===1){
      toast('\uD83D\uDD25 "'+newTrending[0]+'" from your watchlist is trending!');
    } else {
      toast('\uD83D\uDD25 '+newTrending.length+' watchlist items are trending!');
    }
    // Browser notification if permitted
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('Unreeled - Trending Alert',{body:newTrending.join(', ')+' from your watchlist '+(newTrending.length===1?'is':'are')+' trending!',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23ff6b35"/><text x="8" y="24" font-size="22" font-weight="bold" fill="white">U</text></svg>'});
    }
  }
}

async function requestNotifications(){
  if(!('Notification' in window)){toast('Notifications not supported');return}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){toast('Notifications enabled!');return true}
  toast('Notifications blocked');return false;
}
