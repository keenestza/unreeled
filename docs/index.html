async function saveUsername(){
  const un=document.getElementById('new-username').value.trim();
  const err=document.getElementById('un-err');
  err.classList.remove('show');
  if(!un||un.length<3){err.textContent='Username must be at least 3 characters';err.classList.add('show');return}
  if(un.length>20){err.textContent='Username must be 20 characters or less';err.classList.add('show');return}
  if(!/^[a-zA-Z0-9_]+$/.test(un)){err.textContent='Only letters, numbers, and underscores';err.classList.add('show');return}
  const btn=document.getElementById('save-un-btn');
  btn.disabled=true;btn.textContent='Saving...';
  // Check if username is taken
  const{data:existing}=await sb.from('profiles').select('id').eq('username',un).neq('id',user.id).limit(1);
  if(existing&&existing.length){btn.disabled=false;btn.textContent='Save';err.textContent='Username already taken';err.classList.add('show');return}
  const{error}=await sb.from('profiles').update({username:un}).eq('id',user.id);
  btn.disabled=false;btn.textContent='Save';
  if(error){err.textContent=error.message;err.classList.add('show');return}
  profile.username=un;
  document.getElementById('username-edit').style.display='none';
  renderNav();renderAccount();
  toast('Username updated to '+un+'!');
}

// Prompt Google users with auto-generated names to choose a username
function checkUsernamePrompt(){
  if(!user||!profile)return;
  const un=profile.username||'';
  // Detect auto-generated names: contain underscores with random chars, or match Google name patterns with spaces replaced
  const isAutoGen=typeof un === 'string' && un.toLowerCase().startsWith('user_');
  if(isAutoGen&&!sessionStorage.getItem('unreeled-un-prompted')){
    sessionStorage.setItem('unreeled-un-prompted','1');
    setTimeout(()=>{
      const box=document.getElementById('auth-box');
      box.innerHTML='<button class="close" onclick="closeModal()">\u2715</button><h2>Choose Your Username</h2><p class="ms">Pick a display name for your comments and reviews. This is what other users will see.</p><div class="ferr" id="aerr"></div><input class="finput" id="a-user" placeholder="Username (3-20 chars)" maxlength="20" value="'+esc(profile.username)+'"><button class="fbtn" id="a-btn" onclick="saveUsernameFromPrompt()">Save Username</button><p class="flink"><a onclick="closeModal()">Skip for now</a></p>';
      document.getElementById('auth-modal').classList.add('show');
    },1000);
  }
}

async function saveUsernameFromPrompt(){
  const un=document.getElementById('a-user').value.trim();
  if(!un||un.length<3)return showErr('Username must be at least 3 characters');
  if(!/^[a-zA-Z0-9_]+$/.test(un))return showErr('Only letters, numbers, and underscores');
  document.getElementById('a-btn').disabled=true;
  const{data:existing}=await sb.from('profiles').select('id').eq('username',un).neq('id',user.id).limit(1);
  if(existing&&existing.length){document.getElementById('a-btn').disabled=false;return showErr('Username already taken')}

  if(error)return showErr(error.message);
  profile.username=un;
  closeModal();renderNav();
  toast('Welcome, '+un+'!');
}

    } else {

    }
    h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
    if(mine)h+='<button onclick="deleteReview(\''+r.id+'\')" style="font-size:11px;color:var(--td);padding:4px 8px;background:var(--el);border:1px solid var(--brd);border-radius:4px">Delete</button>';
    if(!mine&&user&&!adm)h+='<button onclick="reportReview(\''+r.id+'\')" style="font-size:11px;color:var(--td);padding:4px 8px;background:var(--el);border:1px solid var(--brd);border-radius:4px">\uD83D\uDEA9 Report</button>';
    if(adm){

      else h+='<button onclick="modUnhideReview(\''+r.id+'\')" style="font-size:11px;color:var(--sl);padding:4px 8px;background:var(--slb);border:1px solid var(--slr);border-radius:4px">Unhide</button>';

async function postReview(){
  if(!user)return showAuth('login');
  if(!cr)return;
  const rk=releaseKey(cr);
  const body=document.getElementById('review-body').value.trim();
  const rating=parseInt(document.getElementById('review-rating').value);
  if(!body||body.length<10)return toast('Review must be at least 10 characters');
  if(!rating||rating<1||rating>5)return toast('Select a rating');
  if(detailReviews.some(r=>user&&r.user_id===user.id))return toast('You already reviewed this title');
  const btn=document.getElementById('review-btn');
  btn.disabled=true;btn.textContent='Posting...';
  try{
    const{data,error}=await sb.from('reviews').insert({user_id:user.id,release_key:rk,release_title:cr.title,media_type:cr.media_type,rating:rating,body:body}).select();
    btn.disabled=false;btn.textContent='Post Review';
    if(error){console.error('Review error:',error);toast('Error: '+error.message);return}
    document.getElementById('review-body').value='';
    document.getElementById('review-rating').value='5';
    toast('\u2B50 Review posted!');
    await loadReviews(rk);
  }catch(e){
    btn.disabled=false;btn.textContent='Post Review';
    console.error('Review exception:',e);toast('Error posting review');
  }
}

async function deleteReview(rid){
  await sb.from('reviews').delete().eq('id',rid);
  toast('Review deleted');
  await loadReviews(releaseKey(cr));
}

async function reportReview(rid){
  const r=detailReviews.find(x=>x.id===rid);
  if(!r)return;
  await sb.from('reviews').update({report_count:(r.report_count||0)+1}).eq('id',rid);
  toast('\uD83D\uDEA9 Review reported');
  await loadReviews(releaseKey(cr));
}

async function modHideReview(rid){
  await sb.from('reviews').update({hidden:true}).eq('id',rid);
  toast('Review hidden');
  await loadReviews(releaseKey(cr));
}

async function modUnhideReview(rid){
  await sb.from('reviews').update({hidden:false}).eq('id',rid);
  toast('Review unhidden');
  await loadReviews(releaseKey(cr));
}

async function modDismissReviewReports(rid){
  await sb.from('reviews').update({report_count:0}).eq('id',rid);

  await loadReviews(releaseKey(cr));
}

async function modDeleteReview(rid){

  await sb.from('reviews').delete().eq('id',rid);

  await loadReviews(releaseKey(cr));

  const d=getDismissedRecs();
  d.push(title.toLowerCase());
  localStorage.setItem('unreeled-dismissed-recs',JSON.stringify(d.slice(-100)));
  renderFeed();
  toast('Won\'t show "'+title+'" again');
}
function clearDismissedRecs(){localStorage.removeItem('unreeled-dismissed-recs');renderFeed();toast('Recommendations reset')}

function getRecommendations(max){
  if(!user||(!userWatchlist.length&&!userWatched.length))return[];
  const dismissed=getDismissedRecs();
  // Collect genres and types from watchlist + watched
  const genreScore={};
  const typeScore={};
  const seen=new Set();

  [...userWatchlist,...userWatched].forEach(w=>{
    seen.add((w.release_title||'').toLowerCase());
    // Find in current releases for genre info
    const match=R.find(r=>r.title&&r.title.toLowerCase()===(w.release_title||'').toLowerCase());
    if(match){
      (match.genres||[]).forEach(g=>{genreScore[g]=(genreScore[g]||0)+2});
      typeScore[match.media_type]=(typeScore[match.media_type]||0)+1;
    }
    typeScore[w.media_type]=(typeScore[w.media_type]||0)+1;
  });

  // Also use subscriptions
  userSubs.filter(s=>s.subscription_type==='genre').forEach(s=>{
    genreScore[s.subscription_value]=(genreScore[s.subscription_value]||0)+3;
  });

  // Score all releases
  const scored=[];
  R.forEach((r,idx)=>{
    const tl=(r.title||'').toLowerCase();
    if(seen.has(tl))return;
    if(dismissed.includes(tl))return;
    let score=0;
    (r.genres||[]).forEach(g=>{score+=(genreScore[g]||0)});
    score+=(typeScore[r.media_type]||0)*0.5;
    score+=((r.metadata||{}).popularity||0)*0.001;
    if(score>0)scored.push({r,idx,score});
  });

  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,max);
}

// ═══════ ONBOARDING ═══════
let onboardStep=0;
let onboardingTimer=null;
const onboardSteps=[
  {icon:'\uD83C\uDF89',title:'Welcome to Unreeled!',body:'Your daily tracker for movies, TV, books, games, anime, music and podcasts. Let\'s get you set up in 30 seconds.'},
  {icon:'\uD83D\uDCE1',title:'Subscribe to Streams',body:'Pick your favorite media types to get personalized daily digests. Head to the Streams tab to subscribe.'},
  {icon:'\uD83C\uDFAD',title:'Explore Genres',body:'Browse the Genres tab to discover releases by category. Subscribe to genres you love!'},
  {icon:'\u2B50',title:'Build Your Watchlist',body:'Tap any release to see details, then hit Watchlist to save it. Rate and comment too!'},
  {icon:'\uD83D\uDE80',title:'You\'re All Set!',body:'Enjoy Unreeled! New releases are added every morning at 6 AM UTC.'},
];

function showOnboarding(){
  if(!shouldOfferOnboarding())return;
  if(onboardingTimer){clearTimeout(onboardingTimer);onboardingTimer=null}
  onboardStep=0;
  renderOnboardStep();
}

function shouldOfferOnboarding(){
  const authModal=document.getElementById('auth-modal');
  const authOpen=authModal&&authModal.classList.contains('show');
  return !authOpen&&!localStorage.getItem('unreeled-onboarded')&&!(user&&profile&&profile.onboarding_complete);
}

function scheduleOnboarding(delay){
  if(!shouldOfferOnboarding()||onboardingTimer)return;
  onboardingTimer=setTimeout(()=>{onboardingTimer=null;showOnboarding()},delay||1500);
}

function offerOnboarding(){
  if(!shouldOfferOnboarding())return false;
  showOnboarding();
  return true;
}

function renderOnboardStep(){
  const s=onboardSteps[onboardStep];
  const isLast=onboardStep===onboardSteps.length-1;
  let dots='<div class="onboard-steps">';
  onboardSteps.forEach((_,i)=>{dots+='<span class="'+(i===onboardStep?'on':'')+'"></span>'});
  dots+='</div>';

  const el=document.getElementById('onboard-overlay');
  el.innerHTML='<div class="onboard-card"><div style="font-size:48px;margin-bottom:12px">'+s.icon+'</div><h2>'+s.title+'</h2><p>'+s.body+'</p>'+dots+'<div style="display:flex;gap:8px;justify-content:center">'+(onboardStep>0?'<button onclick="onboardStep--;renderOnboardStep()" style="padding:8px 20px;background:var(--el);border:1px solid var(--brd);border-radius:8px;font-size:13px;color:var(--td)">Back</button>':'')+'<button onclick="'+(isLast?'finishOnboarding()':'onboardStep++;renderOnboardStep()')+'" style="padding:8px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600">'+(isLast?'Get Started!':'Next')+'</button></div><button onclick="finishOnboarding()" style="margin-top:12px;font-size:11px;color:var(--td);background:none;border:none;cursor:pointer">Skip</button></div>';
  el.style.display='flex';
}

async function finishOnboarding(){
  if(onboardingTimer){clearTimeout(onboardingTimer);onboardingTimer=null}
  document.getElementById('onboard-overlay').style.display='none';
  localStorage.setItem('unreeled-onboarded','1');
  if(user){
    await sb.from('profiles').update({onboarding_complete:true}).eq('id',user.id);
  }
}

// ═══════ SOCIAL: FOLLOW/UNFOLLOW ═══════
let userFollowing=[];

async function loadFollowing(){
  if(!user)return;
  const{data}=await sb.from('follows').select('following_id').eq('follower_id',user.id);
  userFollowing=(data||[]).map(f=>f.following_id);
}

function isFollowing(userId){return userFollowing.includes(userId)}

async function toggleFollow(userId,username){
  if(!user)return showAuth('login');
  if(isFollowing(userId)){
    await sb.from('follows').delete().eq('follower_id',user.id).eq('following_id',userId);
    userFollowing=userFollowing.filter(id=>id!==userId);
    toast('Unfollowed '+username);
  } else {
    await sb.from('follows').insert({follower_id:user.id,following_id:userId});
    userFollowing.push(userId);
    toast('Following '+username);
  }
}

// ═══════ TRENDING NOTIFICATIONS ═══════
function checkTrendingWatchlist(){
  if(!user||!userWatchlist.length)return;
  const TR=D.trending||[];
  if(!TR.length)return;
  const notified=JSON.parse(localStorage.getItem('unreeled-trend-notified')||'[]');
  const newTrending=[];

  userWatchlist.forEach(w=>{
    const title=(w.release_title||'').toLowerCase();
    TR.forEach(t=>{
      const tTitle=(t.title||'').toLowerCase();
      if(title===tTitle&&!notified.includes(tTitle)){
        newTrending.push(t.title);
        notified.push(tTitle);
      }
    });
  });

  if(newTrending.length){
    localStorage.setItem('unreeled-trend-notified',JSON.stringify(notified.slice(-50)));
    // Show toast for each
    if(newTrending.length===1){
      toast('\uD83D\uDD25 "'+newTrending[0]+'" from your watchlist is trending!');
    } else {
      toast('\uD83D\uDD25 '+newTrending.length+' watchlist items are trending!');
    }
    // Browser notification if permitted
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('Unreeled - Trending Alert',{body:newTrending.join(', ')+' from your watchlist '+(newTrending.length===1?'is':'are')+' trending!',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23ff6b35"/><text x="8" y="24" font-size="22" font-weight="bold" fill="white">U</text></svg>'});
    }
  }
}

// ═══════ NOTIFICATIONS ═══════
async function requestNotifications(){
  if(!('Notification' in window)){toast('Notifications not supported');return}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){toast('Notifications enabled!');return true}
  toast('Notifications blocked');return false;
}
