name: Daily ingest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run ingest
        run: |
          cd scripts
          python unreeled_ingest.py --date $(date -u +%Y-%m-%d)

      - name: Copy output to docs data folder
        run: |
          mkdir -p docs/data
          cp -f scripts/output/releases_*.json docs/data/
          LATEST=$(ls -t scripts/output/releases_*.json | head -1)
          cp "$LATEST" docs/data/latest.json

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          git commit -m "Daily build $(date -u +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Send digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/send_digest.py
